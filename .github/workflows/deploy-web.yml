# Deploys the Expo web build to GitHub Pages on every push to main.
# The app is fully static (no servers, no keys): planning runs on-device and
# data lives in the visitor's browser storage, so this stays free and durable.
# STATUS: manual trigger only for now. `expo export --platform web` currently
# fails resolving lucide-react-native's per-icon .mjs files (dev server is
# fine; it is an export-time metro resolution issue). Fix that, verify a local
# export, then restore the push trigger to go live on every merge.
name: Deploy web

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Export static web build
        run: npx expo export --platform web
        env:
          EXPO_BASE_URL: /outnyc
      - name: SPA fallback for client-side routes
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
